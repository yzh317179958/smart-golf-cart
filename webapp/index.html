<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Smart Golf Cart</title>
<link rel="stylesheet" href="/leaflet.css" />
<style>
:root {
  --green: #2ecc71;
  --green-dark: #27ae60;
  --red: #e74c3c;
  --orange: #f39c12;
  --blue: #3498db;
  --bg: #1a1a2e;
  --bg2: #16213e;
  --text: #eee;
  --text-dim: #999;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
}

/* Top status bar */
#status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg2);
  border-bottom: 1px solid #333;
  z-index: 1000;
  min-height: 44px;
}
#status-bar .left { display:flex; align-items:center; gap:8px; }
#status-bar .right { display:flex; align-items:center; gap:10px; font-size:12px; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
.status-dot.online { background: var(--green); }
.status-dot.connecting { background: var(--orange); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }
#mode-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}
#mode-badge.following { background: var(--green); color: #000; }
#mode-badge.navigation { background: var(--blue); color: #fff; }
#mode-badge.e_stop { background: var(--red); color: #fff; }

/* Map */
#map {
  flex: 1;
  z-index: 1;
}

/* Bottom control panel */
#controls {
  display: flex;
  flex-direction: column;
  background: var(--bg2);
  border-top: 1px solid #333;
  z-index: 1000;
}
#info-row {
  display: flex;
  justify-content: space-around;
  padding: 6px 8px;
  font-size: 11px;
  color: var(--text-dim);
  border-bottom: 1px solid #333;
}
#info-row span { text-align:center; }
#info-row .val { color: var(--text); font-weight: 600; font-size: 13px; display:block; }

#btn-row {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.btn {
  flex: 1;
  padding: 12px 8px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.1s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-summon { background: var(--green); color: #000; }
#btn-stop { background: var(--red); color: #fff; flex:0.6; }
#btn-mark { background: var(--blue); color: #fff; flex:0.6; }

/* Toast notifications */
#toast-container {
  position: fixed;
  top: 52px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.toast {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  color: #fff;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
  white-space: nowrap;
}
.toast.success { background: rgba(46,204,113,0.9); }
.toast.error { background: rgba(231,76,60,0.9); }
.toast.info { background: rgba(52,152,219,0.9); }
@keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }

/* Waypoint popup */
.wp-popup {
  text-align: center;
  min-width: 120px;
}
.wp-popup .wp-name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}
.wp-popup .wp-coord {
  font-size: 11px;
  color: #666;
  margin-bottom: 8px;
}
.wp-popup button {
  width: 100%;
  padding: 6px 12px;
  background: var(--green-dark);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}
.wp-popup button:active { background: var(--green); }

/* Nav overlay when navigating */
#nav-overlay {
  display: none;
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(52,152,219,0.95);
  color: #fff;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  z-index: 1500;
  text-align: center;
  max-width: 90%;
}
#nav-overlay .cancel-nav {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 16px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 6px;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
}

/* Waypoint number labels */
.wp-num-label {
  background: rgba(0,0,0,0.7) !important;
  border: none !important;
  box-shadow: none !important;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 4px !important;
  border-radius: 3px;
  white-space: nowrap;
}

/* Leaflet overrides for dark */
.leaflet-control-zoom a {
  background: var(--bg2) !important;
  color: var(--text) !important;
  border-color: #444 !important;
}
.leaflet-control-attribution { display:none; }
</style>
</head>
<body>

<!-- Status Bar -->
<div id="status-bar">
  <div class="left">
    <div id="conn-dot" class="status-dot"></div>
    <span id="conn-text" style="font-size:12px">Connecting...</span>
    <span id="mode-badge" class="following">FOLLOWING</span>
  </div>
  <div class="right">
    <span id="follow-state" style="font-size:11px;color:var(--text-dim)"></span>
    <span id="car-online">Car: --</span>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Navigation Overlay -->
<div id="nav-overlay">
  <div id="nav-target-text">Navigating to ...</div>
  <span class="cancel-nav" onclick="cancelNav()">Cancel</span>
</div>

<!-- Bottom Controls -->
<div id="controls">
  <div id="info-row">
    <span>GPS<span class="val" id="gps-display">--</span></span>
    <span>Waypoints<span class="val" id="wp-count">--</span></span>
    <span>Distance<span class="val" id="total-dist">--</span></span>
  </div>
  <div id="btn-row">
    <button class="btn" id="btn-summon" onclick="summonToMe()">Come To Me</button>
    <button class="btn" id="btn-sync" style="background:#8e44ad;color:#fff;flex:0.6" onclick="syncWaypoints()">Sync</button>
    <button class="btn" id="btn-stop" onclick="toggleStop()">STOP</button>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

}).setView([22.658, 114.225], 18);

// Satellite tile
const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20
}).addTo(map);

const gaode = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
  subdomains: '1234',
  maxZoom: 20
});

L.control.layers({
  'Esri Satellite': esri,
  'Gaode Satellite': gaode
}, null, { position: 'topright' }).addTo(map);

// Car icon
const carIcon = L.divIcon({
  className: '',
  html: `<div style="
    width:20px; height:20px;
    background:var(--green);
    border:3px solid #fff;
    border-radius:50%;
    box-shadow:0 0 8px rgba(46,204,113,0.6);
  "></div>`,
  iconSize: [20, 20],
  iconAnchor: [10, 10]
});

// ── Load Waypoints ──
function loadWaypoints() {
  if (typeof EMBEDDED_PATH_GRAPH === 'undefined') return;
  pathGraph = EMBEDDED_PATH_GRAPH;
  renderWaypoints();
}

function renderWaypoints() {
  if (!pathGraph) return;

  // Clear old
  Object.values(waypointMarkers).forEach(m => map.removeLayer(m));
  waypointMarkers = {};
  pathLines.forEach(l => map.removeLayer(l));
  pathLines = [];

  const wps = pathGraph.waypoints;
  const wpIds = Object.keys(wps);

  // Update stats
  document.getElementById('wp-count').textContent = wpIds.length;
  const totalDist = pathGraph.edges.reduce((s, e) => s + (e.distance || 0), 0);
  document.getElementById('total-dist').textContent = totalDist > 1000
    ? (totalDist / 1000).toFixed(1) + 'km'
    : Math.round(totalDist) + 'm';

  // Draw edges
  pathGraph.edges.forEach(edge => {
    const from = wps[edge.from];
    const to = wps[edge.to];
    if (from && to) {
      const line = L.polyline(
        [[from.lat, from.lon], [to.lat, to.lon]],
        { color: '#3498db', weight: 2, opacity: 0.6 }
      ).addTo(map);
      pathLines.push(line);
    }
  });

  // Draw waypoints
  wpIds.forEach(id => {
    const wp = wps[id];
    const isLabeled = wp.label && wp.label !== null;
    // Extract number from wp_XXXX for display
    const wpNum = id.replace('wp_', '').replace(/^0+/, '') || '0';
    const displayName = isLabeled ? wp.label : id;

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${isLabeled ? 14 : 10}px;
        height:${isLabeled ? 14 : 10}px;
        background:${isLabeled ? '#f39c12' : '#3498db'};
        border:2px solid #fff;
        border-radius:50%;
        ${isLabeled ? 'box-shadow:0 0 6px rgba(243,156,18,0.6);' : ''}
      "></div>`,
      iconSize: [isLabeled ? 14 : 10, isLabeled ? 14 : 10],
      iconAnchor: [isLabeled ? 7 : 5, isLabeled ? 7 : 5]
    });

    const marker = L.marker([wp.lat, wp.lon], { icon })
      .addTo(map)
      .bindPopup(`
        <div class="wp-popup">
          <div class="wp-name">${displayName}</div>
          <div class="wp-coord">${wp.lat.toFixed(6)}, ${wp.lon.toFixed(6)}</div>
          <button onclick="navigateTo('${displayName}')">Navigate Here</button>
        </div>
      `);

    // Show number/label on every waypoint
    marker.bindTooltip(isLabeled ? wp.label : wpNum, {
      permanent: true,
      direction: 'right',
      offset: [6, 0],
      className: 'wp-num-label'
    });

    waypointMarkers[id] = marker;
  });

  // Fit map to waypoints
  if (wpIds.length > 0) {
    const bounds = L.latLngBounds(wpIds.map(id => [wps[id].lat, wps[id].lon]));
    map.fitBounds(bounds, { padding: [30, 30] });
  }
}

// ── MQTT Connection ──
function connectMQTT() {
  updateConn('connecting');

  mqttClient = mqtt.connect(MQTT_WS_URL, {
    clientId: 'webapp_' + Math.random().toString(16).slice(2, 8),
    clean: true,
    reconnectPeriod: 3000,
    connectTimeout: 5000
  });

  mqttClient.on('connect', () => {
    updateConn('online');
    mqttClient.subscribe(`${TOPIC_PREFIX}/status/#`);
    toast('MQTT connected', 'success');
  });

  mqttClient.on('close', () => {
    updateConn('offline');
  });

  mqttClient.on('error', (err) => {
    console.error('MQTT error:', err);
    updateConn('offline');
  });

  mqttClient.on('message', (topic, payload) => {
    const msg = payload.toString();
    const sub = topic.replace(`${TOPIC_PREFIX}/status/`, '');

    switch (sub) {
      case 'gps':
        handleGPS(msg);
        break;
      case 'mode':
        handleMode(msg);
        break;
      case 'heartbeat':
        lastHeartbeat = Date.now();
        document.getElementById('car-online').textContent = 'Car: Online';
        document.getElementById('car-online').style.color = 'var(--green)';
        break;
      case 'path_stats':
        handleStats(msg);
        break;
      case 'summon_result':
        handleSummonResult(msg);
        break;
      case 'nav_complete':
        // Only handle if not via summon (summon_result already covers it)
        if (!isNavigating) handleNavComplete(msg);
        break;
      case 'follow':
        handleFollow(msg);
        break;
    }
  });
}

function updateConn(state) {
  const dot = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  dot.className = 'status-dot ' + (state === 'online' ? 'online' : state === 'connecting' ? 'connecting' : '');
  text.textContent = state === 'online' ? 'Connected' : state === 'connecting' ? 'Connecting...' : 'Disconnected';
}

// ── Message Handlers ──
function handleGPS(msg) {
  try {
    const data = JSON.parse(msg);
    carPos = { lat: data.lat, lon: data.lon };

    // Update display
    document.getElementById('gps-display').textContent =
      data.lat.toFixed(5) + ', ' + data.lon.toFixed(5);

    // Update car marker
    if (!carMarker) {
      carMarker = L.marker([data.lat, data.lon], { icon: carIcon, zIndexOffset: 1000 }).addTo(map);
    } else {
      carMarker.setLatLng([data.lat, data.lon]);
    }
  } catch (e) {
    console.error('GPS parse error:', e);
  }
}

function handleMode(msg) {
  currentMode = msg.toLowerCase().trim();
  const badge = document.getElementById('mode-badge');
  badge.textContent = msg.toUpperCase();
  badge.className = 'following'; // reset

  if (currentMode.includes('navigation')) {
    badge.className = 'navigation';
  } else if (currentMode.includes('e_stop') || currentMode.includes('estop')) {
    badge.className = 'e_stop';
  } else {
    badge.className = 'following';
  }

  // Update STOP/RESUME button
  const stopBtn = document.getElementById('btn-stop');
  if (currentMode.includes('e_stop') || currentMode.includes('estop')) {
    stopBtn.textContent = 'RESUME';
    stopBtn.style.background = 'var(--green)';
    stopBtn.style.color = '#000';
  } else {
    stopBtn.textContent = 'STOP';
    stopBtn.style.background = 'var(--red)';
    stopBtn.style.color = '#fff';
  }

  // Update nav overlay
  if (!currentMode.includes('navigation') && isNavigating) {
    isNavigating = false;
    document.getElementById('nav-overlay').style.display = 'none';
  }
}

function handleStats(msg) {
  try {
    const data = JSON.parse(msg);
    if (data.waypoint_count !== undefined) {
      document.getElementById('wp-count').textContent = data.waypoint_count;
    }
    if (data.total_distance_m !== undefined) {
      const d = data.total_distance_m;
      document.getElementById('total-dist').textContent = d > 1000
        ? (d / 1000).toFixed(1) + 'km' : Math.round(d) + 'm';
    }
  } catch (e) {}
}

function handleFollow(msg) {
  const el = document.getElementById('follow-state');
  const state = msg.toLowerCase().trim();
  const labels = { tracking: 'Tracking', idle: '', lost_slow: 'Lost...', lost_wait: 'Lost', lost_reset: '' };
  el.textContent = labels[state] || state;
  el.style.color = state === 'tracking' ? 'var(--green)' : 'var(--orange)';
}

function handleSummonResult(msg) {
  try {
    const data = JSON.parse(msg);
    if (data.status === 'arrived') {
      toast('Arrived at destination!', 'success');
      isNavigating = false;
      document.getElementById('nav-overlay').style.display = 'none';
    } else if (data.status === 'error') {
      toast('Navigation error: ' + (data.detail || ''), 'error');
    } else if (data.status === 'navigating') {
      toast('Navigation started: ' + (data.detail || ''), 'info');
    }
  } catch (e) {
    toast('Summon: ' + msg, 'info');
  }
}

function handleNavComplete(msg) {
  const status = msg.toLowerCase().trim();
  if (status === 'arrived') {
    toast('Navigation complete - arrived!', 'success');
  } else if (status === 'failed' || status === 'blocked') {
    toast('Navigation ' + status, 'error');
  } else if (status === 'canceled') {
    toast('Navigation canceled', 'info');
  }
  isNavigating = false;
  document.getElementById('nav-overlay').style.display = 'none';
}

// ── Actions ──
function publishCmd(cmd, payload) {
  if (!mqttClient || !mqttClient.connected) {
    toast('MQTT not connected', 'error');
    return false;
  }
  mqttClient.publish(`${TOPIC_PREFIX}/cmd/${cmd}`, payload, { qos: 1 });
  return true;
}

function navigateTo(target) {
  if (!confirm(`Navigate to ${target}?`)) return;

  map.closePopup();
  const payload = JSON.stringify({ target: target });
  if (publishCmd('summon', payload)) {
    navTarget = target;
    isNavigating = true;
    document.getElementById('nav-target-text').textContent = `Navigating to ${target}...`;
    document.getElementById('nav-overlay').style.display = 'block';
    toast(`Sent navigation command: ${target}`, 'info');
  }
}

function summonToMe() {
  const btn = document.getElementById('btn-summon');

  // Try geolocation first, fall back to manual input
  if (navigator.geolocation && location.protocol === 'https:') {
    btn.disabled = true;
    btn.textContent = 'Getting GPS...';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        btn.disabled = false;
        btn.textContent = 'Come To Me';
        _doSummonGPS(pos.coords.latitude, pos.coords.longitude);
      },
      (err) => {
        btn.disabled = false;
        btn.textContent = 'Come To Me';
        toast('Auto GPS failed, please enter manually', 'info');
        _summonManualInput();
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else {
    // HTTP or no geolocation — manual input
    _summonManualInput();
  }
}

function _summonManualInput() {
  const input = prompt('Enter your GPS coordinates (lat, lon):\nExample: 22.658, 114.225');
  if (!input) return;
  const parts = input.split(',').map(s => parseFloat(s.trim()));
  if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
    toast('Invalid format. Use: lat, lon', 'error');
    return;
  }
  _doSummonGPS(parts[0], parts[1]);
}

function _doSummonGPS(lat, lon) {
  if (!confirm(`Summon cart to (${lat.toFixed(5)}, ${lon.toFixed(5)})?`)) return;

  const payload = JSON.stringify({ lat, lon });
  if (publishCmd('summon', payload)) {
    // Show position on map
    L.marker([lat, lon], {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:16px;height:16px;background:#e74c3c;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(231,76,60,0.6);"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      })
    }).addTo(map).bindPopup('Summon target');

    navTarget = 'your location';
    isNavigating = true;
    document.getElementById('nav-target-text').textContent = 'Cart coming to you...';
    document.getElementById('nav-overlay').style.display = 'block';
    toast('Summoning cart to location', 'info');
  }
}

function syncWaypoints() {
  const btn = document.getElementById('btn-sync');
  btn.disabled = true;
  btn.textContent = 'Syncing...';
  toast('Pulling waypoints from car...', 'info');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/sync?t=' + Date.now(), true);
  xhr.timeout = 20000;
  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = 'Sync';
    try {
      var r = JSON.parse(xhr.responseText);
      if (r.ok) {
        toast(r.message, 'success');
        // Reload page to get rebuilt HTML with new data
        setTimeout(function() { location.reload(); }, 1500);
      } else {
        toast('Sync failed: ' + r.message, 'error');
      }
    } catch(e) {
      toast('Sync error: ' + e, 'error');
    }
  };
  xhr.onerror = function() {
    btn.disabled = false; btn.textContent = 'Sync';
    toast('Sync network error', 'error');
  };
  xhr.ontimeout = function() {
    btn.disabled = false; btn.textContent = 'Sync';
    toast('Sync timeout - car offline?', 'error');
  };
  xhr.send();
}

function toggleStop() {
  if (currentMode.includes('e_stop') || currentMode.includes('estop')) {
    publishCmd('mode', 'resume');
    toast('Resume command sent', 'success');
  } else {
    publishCmd('mode', 'e_stop');
    toast('STOP command sent!', 'error');
  }
}

function cancelNav() {
  publishCmd('mode', 'cancel');
  isNavigating = false;
  document.getElementById('nav-overlay').style.display = 'none';
  toast('Navigation canceled', 'info');
}

// ── Toasts ──
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Heartbeat check ──
setInterval(() => {
  if (lastHeartbeat > 0 && Date.now() - lastHeartbeat > 12000) {
    document.getElementById('car-online').textContent = 'Car: Offline';
    document.getElementById('car-online').style.color = 'var(--red)';
  }
}, 5000);

// ── Init ──
loadWaypoints();
try { connectMQTT(); } catch(e) { console.error('MQTT init error:', e); }

// Center on car when tapping GPS display
document.getElementById('gps-display').style.cursor = 'pointer';
document.getElementById('gps-display').addEventListener('click', () => {
  if (carPos) map.setView([carPos.lat, carPos.lon], 19);
});
</script>
</body>
</html>
