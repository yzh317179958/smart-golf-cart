# P2-1.5: collision_monitor 跟随避障配置
#
# 工作原理: PID → /cmd_vel_raw → collision_monitor → /cmd_vel
# 前方有障碍 → 停车或减速，安全时原样放行

collision_monitor:
  ros__parameters:
    base_frame_id: base_footprint
    odom_frame_id: odom_combined
    cmd_vel_in_topic: /cmd_vel_raw
    cmd_vel_out_topic: /cmd_vel
    state_topic: /collision_monitor_state
    transform_tolerance: 0.3
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    # 传感器数据源: N10P 2D LiDAR
    observation_sources: ["scan_source"]
    scan_source:
      type: scan
      topic: /scan
      min_height: 0.0
      max_height: 2.0
      enabled: true

    # 避障区域
    polygons: ["SlowDown", "Stop"]

    # STOP 区: 前方 0.4m 内 → 立即停车（紧凑，只防极近碰撞）
    Stop:
      type: polygon
      points: [0.4, 0.25, 0.4, -0.25, 0.0, -0.25, 0.0, 0.25]
      action_type: stop
      max_points: 3
      visualize: true
      polygon_pub_topic: /collision_monitor/stop_zone

    # SLOWDOWN 区: 前方 1.0m 内 → 速度降至 40%
    SlowDown:
      type: polygon
      points: [1.0, 0.3, 1.0, -0.3, -0.1, -0.3, -0.1, 0.3]
      action_type: slowdown
      max_points: 3
      slowdown_ratio: 0.4
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_zone
