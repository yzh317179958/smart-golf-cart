<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS 路点地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
#map { width: 100%; height: 100vh; }
#info {
  position: absolute; top: 10px; left: 60px; z-index: 1000;
  background: rgba(255,255,255,0.95); padding: 10px 16px;
  border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-size: 14px; max-width: 320px;
}
#info h3 { margin-bottom: 6px; font-size: 16px; }
#info .stat { color: #555; margin: 2px 0; }
#info .stat b { color: #333; }
#info .status { margin-top: 6px; font-size: 12px; }
#info .status.ok { color: #2a7; }
#info .status.err { color: #d44; }
#controls {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: flex; gap: 8px;
}
#controls button {
  background: white; border: 1px solid #ccc; border-radius: 6px;
  padding: 8px 16px; cursor: pointer; font-size: 13px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
#controls button:hover { background: #f0f0f0; }
#controls button.active { background: #2a7; color: white; border-color: #2a7; }
.wp-label {
  background: none; border: none; box-shadow: none;
  font-size: 11px; font-weight: bold; color: #333;
}
</style>
</head>
<body>

<div id="info">
  <h3>GPS 路点地图</h3>
  <div class="stat">路点: <b id="wp-count">-</b> | 边: <b id="edge-count">-</b></div>
  <div class="stat">总距离: <b id="total-dist">-</b> m</div>
  <div class="stat">标记点: <b id="labeled-count">-</b></div>
  <div id="status" class="status">加载中...</div>
</div>

<div id="controls">
  <button id="btn-auto" class="active" onclick="toggleAuto()">自动刷新: 开</button>
  <button onclick="fitBounds()">全部显示</button>
  <button onclick="toggleSatellite()">当前: Esri → 切OSM</button>
  <button onclick="clearPath()">清除显示</button>
</div>

<div id="map"></div>

<script>
// 地图初始化 — 默认东莞
const map = L.map('map').setView([22.659, 114.225], 18);

// 图层
const osmLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
  maxZoom: 22, maxNativeZoom: 20, subdomains: 'abcd',
  attribution: 'CartoDB Voyager (WGS-84)'
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 22, attribution: 'Esri Satellite (WGS-84)'
});
// 高德卫星图（GCJ-02 坐标系，中国地图标准）
const gaodeLayer = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
  maxZoom: 20, subdomains: '1234', attribution: '高德卫星 (GCJ-02)'
});
satLayer.addTo(map);  // 默认卫星图
let currentBase = 'esri'; // 'esri' | 'osm' | 'gaode'

// 路点图层
const wpLayerGroup = L.layerGroup().addTo(map);
const edgeLayerGroup = L.layerGroup().addTo(map);
const labelLayerGroup = L.layerGroup().addTo(map);

let autoRefresh = true;
let refreshTimer = null;
let lastData = null;
let firstLoad = true;

// 颜色
const COLOR_WP = '#e74c3c';       // 普通路点 — 红
const COLOR_LABELED = '#f39c12';   // 标记路点 — 橙
const COLOR_EDGE = '#3498db';      // 边 — 蓝
const COLOR_LATEST = '#2ecc71';    // 最新路点 — 绿

function toggleSatellite() {
  // 移除当前底图
  map.removeLayer(satLayer);
  map.removeLayer(osmLayer);
  map.removeLayer(gaodeLayer);
  // 循环切换: esri → osm → gaode → esri
  if (currentBase === 'esri') {
    osmLayer.addTo(map);
    currentBase = 'osm';
    document.querySelector('#controls button:nth-child(3)').textContent = '当前: OSM → 切高德';
  } else if (currentBase === 'osm') {
    gaodeLayer.addTo(map);
    currentBase = 'gaode';
    document.querySelector('#controls button:nth-child(3)').textContent = '当前: 高德 → 切Esri';
  } else {
    satLayer.addTo(map);
    currentBase = 'esri';
    document.querySelector('#controls button:nth-child(3)').textContent = '当前: Esri → 切OSM';
  }
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('btn-auto');
  btn.textContent = '自动刷新: ' + (autoRefresh ? '开' : '关');
  btn.classList.toggle('active', autoRefresh);
}

function fitBounds() {
  if (!lastData || !lastData.waypoints) return;
  const wps = Object.values(lastData.waypoints);
  if (wps.length === 0) return;
  const bounds = L.latLngBounds(wps.map(w => [w.lat, w.lon]));
  map.fitBounds(bounds, { padding: [60, 60], maxZoom: 19 });
}

function clearPath() {
  wpLayerGroup.clearLayers();
  edgeLayerGroup.clearLayers();
  labelLayerGroup.clearLayers();
  lastData = null;
}

function renderData(data) {
  wpLayerGroup.clearLayers();
  edgeLayerGroup.clearLayers();
  labelLayerGroup.clearLayers();

  const wps = data.waypoints || {};
  const edges = data.edges || [];
  const wpIds = Object.keys(wps);

  // 找最新路点（按 last_traversed）
  let latestId = null;
  let latestTime = '';
  for (const [id, wp] of Object.entries(wps)) {
    if (wp.last_traversed > latestTime) {
      latestTime = wp.last_traversed;
      latestId = id;
    }
  }

  // 画边
  for (const edge of edges) {
    const from = wps[edge.from];
    const to = wps[edge.to];
    if (!from || !to) continue;
    const line = L.polyline(
      [[from.lat, from.lon], [to.lat, to.lon]],
      { color: COLOR_EDGE, weight: 3, opacity: 0.7 }
    );
    line.bindTooltip(`${edge.distance?.toFixed(1) || '?'}m`, {
      permanent: false, direction: 'center'
    });
    edgeLayerGroup.addLayer(line);
  }

  // 画路点
  let idx = 0;
  for (const [id, wp] of Object.entries(wps)) {
    idx++;
    const isLabeled = !!wp.label;
    const isLatest = id === latestId;
    const color = isLatest ? COLOR_LATEST : (isLabeled ? COLOR_LABELED : COLOR_WP);
    const radius = isLatest ? 8 : (isLabeled ? 7 : 5);

    const marker = L.circleMarker([wp.lat, wp.lon], {
      radius: radius,
      color: '#fff',
      weight: 2,
      fillColor: color,
      fillOpacity: 0.9,
    });

    const popupText = [
      `<b>${id}</b>`,
      wp.label ? `标记: ${wp.label}` : null,
      `坐标: ${wp.lat.toFixed(7)}, ${wp.lon.toFixed(7)}`,
      `经过: ${wp.traverse_count} 次`,
      `最近: ${wp.last_traversed}`,
    ].filter(Boolean).join('<br>');
    marker.bindPopup(popupText);

    wpLayerGroup.addLayer(marker);

    // 标记点显示名称
    if (isLabeled) {
      const label = L.marker([wp.lat, wp.lon], {
        icon: L.divIcon({
          className: 'wp-label',
          html: wp.label,
          iconAnchor: [-8, 4],
        })
      });
      labelLayerGroup.addLayer(label);
    }

    // 序号标签（始终显示）
    const numLabel = L.marker([wp.lat, wp.lon], {
      icon: L.divIcon({
        className: 'wp-label',
        html: `<span style="color:${color};font-size:10px">${idx}</span>`,
        iconAnchor: [4, -8],
      })
    });
    labelLayerGroup.addLayer(numLabel);
  }

  // 更新统计
  const totalDist = edges.reduce((s, e) => s + (e.distance || 0), 0);
  const labeledCount = Object.values(wps).filter(w => w.label).length;
  document.getElementById('wp-count').textContent = wpIds.length;
  document.getElementById('edge-count').textContent = edges.length;
  document.getElementById('total-dist').textContent = totalDist.toFixed(1);
  document.getElementById('labeled-count').textContent = labeledCount;

  lastData = data;
}

async function fetchData() {
  try {
    const resp = await fetch('path_graph.json?t=' + Date.now());
    if (!resp.ok) {
      setStatus('err', `HTTP ${resp.status} — 文件不存在？`);
      return;
    }
    const data = await resp.json();
    const wpCount = Object.keys(data.waypoints || {}).length;
    renderData(data);

    // 首次加载自动缩放到全部路点
    if (firstLoad && wpCount > 0) {
      fitBounds();
      firstLoad = false;
    }

    setStatus('ok', `更新于 ${new Date().toLocaleTimeString()} | ${wpCount} 路点`);
  } catch (e) {
    setStatus('err', `错误: ${e.message}`);
  }
}

function setStatus(type, text) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = text;
}

// 定时刷新
function tick() {
  if (autoRefresh) fetchData();
  refreshTimer = setTimeout(tick, 3000);
}

// 防止 Leaflet 拦截控件点击
L.DomEvent.disableClickPropagation(document.getElementById('controls'));
L.DomEvent.disableClickPropagation(document.getElementById('info'));

// 启动
fetchData();
tick();
</script>
</body>
</html>
